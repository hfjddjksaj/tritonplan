<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TritonPlan</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        width: 320px;
        margin: 0;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        color: #1a2233;
        background: #fff;
      }
      header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        background: #0b1f3a;
        color: #fff;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 700; }
      header .tag { font-size: 11px; opacity: 0.85; }
      .body { padding: 12px 14px; }
      .subhead {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7480;
        margin: 0 0 8px;
      }
      ul { list-style: none; margin: 0; padding: 0; max-height: 260px; overflow-y: auto; }
      li {
        padding: 6px 8px;
        border-radius: 6px;
      }
      li + li { margin-top: 2px; }
      li:nth-child(odd) { background: #f4f6fa; }
      .code { font-weight: 700; color: #0b1f3a; }
      .title { color: #43505f; }
      .empty { color: #6b7480; font-style: italic; padding: 8px 0; }
      button.open {
        margin-top: 12px;
        width: 100%;
        padding: 9px 12px;
        font: 600 13px/1 inherit;
        color: #fff;
        background: #0b1f3a;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button.open:hover { background: #24406b; }
    </style>
  </head>
  <body>
    <header>
      <h1>TritonPlan</h1>
      <span class="tag">passive TSS observer</span>
    </header>
    <div class="body">
      <p class="subhead">Courses you've browsed</p>
      <ul id="courses"><li class="empty">Loading…</li></ul>
      <button class="open" id="open">Open TritonPlan</button>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
